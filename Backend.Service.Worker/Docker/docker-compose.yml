services:
  api:
    image: "explorer-backend-worker-${DEPLOY_ENV:-production}"
    container_name: explorer-backend-worker-${DEPLOY_ENV:-production}
    build:
      context: ../..
      dockerfile: Backend.Service.Worker/Docker/build/Dockerfile
      args:
        BUILD_CONFIGURATION: ${BUILD_CONFIGURATION:-Release}
    volumes:
      - ./logs:/app/logs
      - ./config:/app/config
    entrypoint: "./start-worker-service-docker.sh"
    networks:
      - worker
      - postgresql
    restart: unless-stopped
    logging:
      driver: "json-file"
      options:
        max-file: "5"
        max-size: "20m"

networks:
  worker:
    name: worker-${DEPLOY_ENV:-production}-network
  postgresql:
    name: postgresql-network
    external: true
